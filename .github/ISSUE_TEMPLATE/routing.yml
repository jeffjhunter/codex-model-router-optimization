name: Routing behavior report
description: Report a reproducible route, review, revision, or terminal-state problem.
title: "[Routing]: "
labels: [routing]
body:
  - type: checkboxes
    attributes:
      label: Evidence safety
      options:
        - label: The scenario is disposable or sanitized and contains no secrets or private source.
          required: true
        - label: I am not presenting an illustrative trace as an authenticated benchmark result.
          required: true
  - type: textarea
    attributes:
      label: Environment and authority
      description: CMRO, Codex, models, reasoning levels, permission mode, tools, date, and allowed side effects.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Task and expected routing
      description: Sanitized request, expected worker/reviewer, and why.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Observed lifecycle
      description: Agent IDs, plan versions, attempts, decisions, checks, and terminal state.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction artifact
      description: Link to a minimal public fixture or provide enough sanitized detail to reproduce.
    validations:
      required: true
